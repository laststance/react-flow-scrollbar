name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Gate hard: only Dependabot's own PRs, and only the github-actions ecosystem (the branch prefix encodes
    # it). npm bumps are deliberately excluded — a human reviews dependency-tree changes, which is where the
    # supply-chain risk actually lives.
    if: >-
      github.actor == 'dependabot[bot]' &&
      startsWith(github.head_ref, 'dependabot/github_actions/')
    runs-on: ubuntu-latest
    steps:
      # Turn on GitHub's native auto-merge so the PR merges only after required CI checks pass.
      # Requires repo settings: "Allow auto-merge" enabled, and branch protection requiring the CI checks.
      - run: gh pr merge "$PR_URL" --squash --auto
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
