name: Release

on:
  push:
    branches: [main]

# Never run two releases at once — a second push waits rather than racing the publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # release-it pushes the git tag and creates the GitHub Release
  id-token: write # mint the OIDC token npm trusted publishing exchanges for a short-lived publish token (+ provenance)

jobs:
  release:
    name: publish to npm (only on `release vX.Y.Z` commits)
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a commit SHA, not a moving tag: a tag like @v6 can be repointed at malicious
      # code (a tag-hijack supply-chain attack); a SHA cannot. Dependabot (.github/dependabot.yml) keeps the
      # pins current.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so release-it can create the tag + generate release notes
      # Reads packageManager: pnpm@11.6.0 from package.json. Do NOT pin to pnpm 10 — versions < 11.1.3 mishandle
      # the empty NODE_AUTH_TOKEN placeholder and break OIDC trusted publishing (pnpm#11513).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # OIDC trusted publishing requires npm >= 11.5.1 / Node >= 22.14; Node 24 ships npm 11.x
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # --ignore-scripts blocks a malicious postinstall anywhere in the dependency tree from running in the
      # publish job. Verified the tsup/esbuild build still succeeds without install scripts.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: git config user.name "${{ github.actor }}"
      - run: git config user.email "${{ github.actor }}@users.noreply.github.com"
      # Publish ONLY when the latest commit is a release commit ("release vX.Y.Z"), created locally by
      # `pnpm push-release-commit` (it bumps the version, commits "release v${version}", and pushes). The
      # version is already bumped in that commit, so release-it runs with --no-increment. Any non-release push
      # to main is a no-op here. `pnpm build` refreshes dist/ before npm publish (the package ships files: ["dist"]).
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN / NODE_AUTH_TOKEN on purpose: npm trusted publishing authenticates tokenlessly via the
          # OIDC id-token minted above. release-it's npm plugin runs `npm publish`; npm >= 11.5.1 performs the
          # OIDC exchange against the trusted publisher configured on npmjs.com (this repo + workflow file
          # "release.yml" — do not rename). `publishConfig.provenance: true` in package.json adds the provenance
          # attestation; do not also pass --provenance here (it would double-specify).
        run: |
          if git log --format=%s -n 1 | grep -E -q '^release v[0-9]+\.[0-9]+\.[0-9]+$'; then
            pnpm build
            pnpm release-it --no-increment --verbose
          fi
