version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Pins never drift on their own, so without this they rot;
  # Dependabot bumps the SHA + its `# vX.Y.Z` comment together. These bumps are auto-merged once CI passes
  # (see .github/workflows/dependabot-auto-merge.yml) — low risk, since they only move first-party actions
  # between reviewed releases.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # These bumps auto-merge without human review, so wait a week after a release before adopting it —
    # a window for a compromised action release to be caught/yanked before it auto-merges here.
    cooldown:
      default-days: 7
    groups:
      # One grouped PR per week instead of one per action.
      github-actions:
        patterns: ['*']

  # npm dependency updates. Deliberately NOT auto-merged: the dependency tree is the actual supply-chain
  # attack surface, so these PRs wait for a human to review the diff before merging.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Quarantine freshly-published versions before proposing them: pnpm 11.6's minimumReleaseAge policy
    # (24h cutoff) rejects too-new packages during CI install, so without this the weekly PR lands red
    # until the versions age. 7 days also lets a malicious release surface and be yanked before it reaches us.
    cooldown:
      default-days: 7
    groups:
      npm-dev:
        dependency-type: development
        patterns: ['*']
